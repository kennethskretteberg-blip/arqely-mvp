<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romtegner Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg:#0d0e10; --surface:#141517; --surface2:#1b1d21; --border:#252830;
  --accent:#22d3ee; --accent2:#47b4ff; --warn:#ff8c47;
  --text:#eef0f4; --muted:#9097a8; --dim:#555d6e;
  --green:#22c55e; --red:#ef4444;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
button{font-family:'DM Sans',sans-serif;cursor:pointer}
input,textarea,select{font-family:'DM Sans',sans-serif;color:var(--text)}

/* Layout */
.admin-layout{display:flex;height:100vh}
.admin-sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.admin-logo{padding:24px 20px 16px;font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent)}
.admin-logo span{font-size:12px;font-weight:400;color:var(--muted);display:block;font-family:'DM Sans',sans-serif;margin-top:2px}
.admin-nav{display:flex;flex-direction:column;gap:2px;padding:8px 12px;flex:1}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background .1s;font-size:14px;color:var(--muted);border:none;background:none;text-align:left;width:100%}
.admin-nav-item:hover{background:var(--surface2);color:var(--text)}
.admin-nav-item.active{background:rgba(34,211,238,.1);color:var(--accent)}
.admin-nav-item .nav-ico{font-size:18px;width:24px;text-align:center}
.admin-nav-bottom{padding:16px 20px;border-top:1px solid var(--border)}
.admin-nav-bottom .admin-user{font-size:12px;color:var(--muted);margin-bottom:8px}
.admin-nav-bottom .admin-user strong{color:var(--text)}
.admin-logout{font-size:12px;color:var(--dim);text-decoration:underline;cursor:pointer;background:none;border:none;padding:0}
.admin-logout:hover{color:var(--accent)}

/* Main content */
.admin-main{flex:1;overflow-y:auto;padding:32px 40px}
.admin-main h1{font-size:24px;font-weight:600;margin-bottom:24px}
.admin-main h2{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--text)}

/* Stat cards */
.stat-cards{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 24px;min-width:180px;flex:1}
.stat-card .stat-val{font-size:32px;font-weight:700;color:var(--accent);font-family:'DM Mono',monospace}
.stat-card .stat-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:4px}

/* Table */
.admin-table-wrap{overflow-x:auto}
table.admin-table{width:100%;border-collapse:collapse;font-size:13px}
.admin-table th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--border)}
.admin-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.admin-table tr:hover td{background:var(--surface)}
.admin-table .td-name{font-weight:500;color:var(--text)}
.admin-table .td-email{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px}
.admin-table .td-msg{color:var(--dim);font-size:12px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.admin-table .td-date{color:var(--dim);font-size:12px;font-family:'DM Mono',monospace}

/* Status badges */
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em}
.badge-pending{background:rgba(255,180,60,.15);color:var(--warn)}
.badge-active{background:rgba(34,197,94,.15);color:var(--green)}
.badge-rejected{background:rgba(239,68,68,.15);color:var(--red)}

/* Action buttons */
.btn-sm{font-size:12px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;transition:border-color .15s}
.btn-sm:hover{border-color:var(--accent)}
.btn-sm.btn-approve{border-color:var(--green);color:var(--green)}
.btn-sm.btn-approve:hover{background:rgba(34,197,94,.1)}
.btn-sm.btn-reject{border-color:var(--red);color:var(--red)}
.btn-sm.btn-reject:hover{background:rgba(239,68,68,.1)}
.btn-sm.btn-deactivate{border-color:var(--warn);color:var(--warn)}

/* Filters */
.filter-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-btn{font-size:12px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--accent);color:var(--text)}
.filter-btn.active{background:rgba(34,211,238,.1);border-color:var(--accent);color:var(--accent)}

/* Forms */
.admin-form{display:flex;flex-direction:column;gap:16px;max-width:480px}
.admin-form label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.admin-form input,.admin-form select,.admin-form textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;transition:border-color .15s}
.admin-form input:focus,.admin-form select:focus{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#0d0e10;border:none;border-radius:8px;padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.86}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* Org members list */
.member-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.member-row{display:flex;align-items:center;gap:12px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.member-row .member-name{flex:1;font-size:13px;font-weight:500}
.member-row .member-role{font-size:11px;color:var(--muted)}
.member-row .member-remove{font-size:11px;color:var(--red);cursor:pointer;text-decoration:underline;background:none;border:none}

/* Org detail */
.org-detail{margin-top:16px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.org-detail h3{font-size:15px;font-weight:600;margin-bottom:12px}

/* Product access checkboxes */
.product-access{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.product-access label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text);cursor:pointer}
.product-access input[type=checkbox]{accent-color:var(--accent)}

/* Login screen */
.admin-login{display:flex;align-items:center;justify-content:center;height:100vh}
.admin-login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:48px;width:400px;display:flex;flex-direction:column;gap:20px;text-align:center}
.admin-login-card h1{font-family:'Syne',sans-serif;font-size:24px;color:var(--accent)}
.admin-login-card .login-error{color:var(--red);font-size:13px;display:none}
.admin-login-card input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:14px;color:var(--text);outline:none;width:100%}
.admin-login-card input:focus{border-color:var(--accent)}
.no-access{text-align:center;color:var(--muted);font-size:15px;padding:60px 20px}
</style>
</head>
<body>

<!-- Login -->
<div id="admin-login" class="admin-login" style="display:none">
  <div class="admin-login-card">
    <h1>Romtegner Admin</h1>
    <p style="color:var(--muted);font-size:13px">Logg inn med superadmin-konto</p>
    <div class="login-error" id="admin-login-error"></div>
    <input id="admin-email" type="email" placeholder="E-post">
    <input id="admin-pass" type="password" placeholder="Passord">
    <button class="btn-primary" onclick="adminLogin()" id="admin-login-btn">Logg inn</button>
  </div>
</div>

<!-- No access -->
<div id="admin-no-access" class="admin-login" style="display:none">
  <div class="admin-login-card">
    <h1>Romtegner Admin</h1>
    <div class="no-access">
      <p>🚫 Du har ikke tilgang til admin-panelet.</p>
      <p style="margin-top:8px">Kun superadmin kan bruke denne siden.</p>
    </div>
    <button class="btn-primary" onclick="adminLogout()" style="background:var(--surface2);color:var(--text)">Logg ut</button>
  </div>
</div>

<!-- Main admin layout -->
<div id="admin-app" class="admin-layout" style="display:none">
  <aside class="admin-sidebar">
    <div class="admin-logo">Romtegner<span>Admin-panel</span></div>
    <nav class="admin-nav">
      <button class="admin-nav-item active" data-section="overview" onclick="adminNavigate('overview')">
        <span class="nav-ico">📊</span> Oversikt
      </button>
      <button class="admin-nav-item" data-section="users" onclick="adminNavigate('users')">
        <span class="nav-ico">👥</span> Brukere
      </button>
      <button class="admin-nav-item" data-section="orgs" onclick="adminNavigate('orgs')">
        <span class="nav-ico">🏢</span> Organisasjoner
      </button>
    </nav>
    <div class="admin-nav-bottom">
      <div class="admin-user" id="admin-user-info"></div>
      <button class="admin-logout" onclick="adminLogout()">Logg ut</button>
      <br>
      <a href="romtegner.html" style="font-size:11px;color:var(--dim);margin-top:8px;display:inline-block">← Tilbake til Romtegner</a>
    </div>
  </aside>
  <main class="admin-main" id="admin-content"></main>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────
const SUPABASE_URL = 'https://nhzhffertfqdeslhzyxx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_0QOhnETGSeJ4TiNCH12vtA_U3kIjSvC';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentSection = 'overview';
let userFilter = 'all';
let allProfiles = [];
let allOrgs = [];
let allOrgMembers = [];
let allCategories = [];
let selectedOrgId = null;

// ─── INIT ────────────────────────────────────────────────────

async function adminInit() {
  const { data: { session } } = await db.auth.getSession();
  if (!session?.user) {
    showLogin();
    return;
  }
  currentUser = session.user;
  const isSuperadmin = currentUser.app_metadata?.is_superadmin === true;
  if (!isSuperadmin) {
    document.getElementById('admin-no-access').style.display = 'flex';
    return;
  }
  showAdmin();
}

function showLogin() {
  document.getElementById('admin-login').style.display = 'flex';
  document.getElementById('admin-app').style.display = 'none';
  document.getElementById('admin-no-access').style.display = 'none';
}

async function showAdmin() {
  document.getElementById('admin-login').style.display = 'none';
  document.getElementById('admin-no-access').style.display = 'none';
  document.getElementById('admin-app').style.display = 'flex';
  document.getElementById('admin-user-info').innerHTML =
    `<strong>${currentUser.email}</strong><br>Superadmin`;
  await refreshData();
  renderSection();
}

// ─── AUTH ─────────────────────────────────────────────────────

async function adminLogin() {
  const email = document.getElementById('admin-email').value.trim();
  const pass = document.getElementById('admin-pass').value;
  const errEl = document.getElementById('admin-login-error');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent = 'Fyll inn e-post og passord.'; errEl.style.display = 'block'; return; }
  const btn = document.getElementById('admin-login-btn');
  btn.disabled = true;
  try {
    const { data, error } = await db.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;
    currentUser = data.user;
    if (!currentUser.app_metadata?.is_superadmin) {
      document.getElementById('admin-login').style.display = 'none';
      document.getElementById('admin-no-access').style.display = 'flex';
      return;
    }
    showAdmin();
  } catch(err) {
    errEl.textContent = err.message?.includes('Invalid login') ? 'Feil e-post eller passord.' : (err.message || 'Feil ved innlogging.');
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false;
  }
}

async function adminLogout() {
  await db.auth.signOut();
  currentUser = null;
  showLogin();
}

// Enter key for login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('admin-login').style.display !== 'none') {
    adminLogin();
  }
});

// ─── DATA ─────────────────────────────────────────────────────

async function refreshData() {
  try {
    const [profilesRes, orgsRes, membersRes, catsRes] = await Promise.all([
      db.from('profiles').select('*').order('created_at', { ascending: false }),
      db.from('organizations').select('*').order('created_at'),
      db.from('organization_members').select('*'),
      db.from('product_categories').select('*').order('sort_order'),
    ]);
    allProfiles = profilesRes.data || [];
    allOrgs = orgsRes.data || [];
    allOrgMembers = membersRes.data || [];
    allCategories = catsRes.data || [];
  } catch(e) {
    console.warn('Data refresh failed:', e.message);
  }
}

// ─── NAVIGATION ──────────────────────────────────────────────

function adminNavigate(section) {
  currentSection = section;
  document.querySelectorAll('.admin-nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.section === section));
  renderSection();
}

function renderSection() {
  const el = document.getElementById('admin-content');
  if (currentSection === 'overview') renderOverview(el);
  else if (currentSection === 'users') renderUsers(el);
  else if (currentSection === 'orgs') renderOrgs(el);
}

// ─── OVERVIEW ─────────────────────────────────────────────────

function renderOverview(el) {
  const total = allProfiles.length;
  const pending = allProfiles.filter(p => p.status === 'pending').length;
  const active = allProfiles.filter(p => p.status === 'active').length;
  const orgCount = allOrgs.length;

  el.innerHTML = `
    <h1>Oversikt</h1>
    <div class="stat-cards">
      <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-label">Brukere totalt</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--warn)">${pending}</div><div class="stat-label">Venter på godkjenning</div></div>
      <div class="stat-card"><div class="stat-val" style="color:var(--green)">${active}</div><div class="stat-label">Aktive brukere</div></div>
      <div class="stat-card"><div class="stat-val">${orgCount}</div><div class="stat-label">Organisasjoner</div></div>
    </div>
    ${pending > 0 ? `
      <h2>⏳ Ventende godkjenninger</h2>
      ${renderUserTable(allProfiles.filter(p => p.status === 'pending'))}
    ` : '<p style="color:var(--muted)">Ingen ventende godkjenninger.</p>'}
  `;
}

// ─── USERS ────────────────────────────────────────────────────

function renderUsers(el) {
  const filters = ['all', 'pending', 'active', 'rejected'];
  const filterLabels = { all: 'Alle', pending: 'Venter', active: 'Aktive', rejected: 'Avviste' };
  const counts = {};
  filters.forEach(f => counts[f] = f === 'all' ? allProfiles.length : allProfiles.filter(p => p.status === f).length);

  const filtered = userFilter === 'all' ? allProfiles : allProfiles.filter(p => p.status === userFilter);

  el.innerHTML = `
    <h1>Brukere</h1>
    <div class="filter-bar">
      ${filters.map(f => `
        <button class="filter-btn${userFilter === f ? ' active' : ''}" onclick="setUserFilter('${f}')">
          ${filterLabels[f]} (${counts[f]})
        </button>
      `).join('')}
    </div>
    ${renderUserTable(filtered)}
  `;
}

function setUserFilter(f) {
  userFilter = f;
  renderSection();
}

function renderUserTable(profiles) {
  if (!profiles.length) return '<p style="color:var(--muted);padding:20px 0">Ingen brukere å vise.</p>';

  return `
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr>
          <th>Navn</th><th>E-post</th><th>Firma</th><th>Melding</th><th>Registrert</th><th>Status</th><th>Handlinger</th>
        </tr></thead>
        <tbody>
          ${profiles.map(p => `
            <tr>
              <td class="td-name">${esc(p.full_name || '–')}</td>
              <td class="td-email">${esc(p.email || '–')}</td>
              <td>${esc(p.company_name || '–')}</td>
              <td class="td-msg" title="${esc(p.message || '')}">${esc(p.message || '–')}</td>
              <td class="td-date">${formatDate(p.created_at)}</td>
              <td><span class="badge badge-${p.status}">${statusLabel(p.status)}</span></td>
              <td>${renderUserActions(p)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function renderUserActions(profile) {
  const id = profile.id;
  if (profile.status === 'pending') {
    return `
      <button class="btn-sm btn-approve" onclick="approveUser('${id}')">✓ Godkjenn</button>
      <button class="btn-sm btn-reject" onclick="rejectUser('${id}')">✕ Avvis</button>
    `;
  }
  if (profile.status === 'active') {
    return `
      <button class="btn-sm btn-deactivate" onclick="rejectUser('${id}')">Deaktiver</button>
      <select class="btn-sm" onchange="addUserToOrg('${id}', this.value); this.value='';" style="max-width:140px">
        <option value="">Koble til org...</option>
        ${allOrgs.map(o => `<option value="${o.id}">${esc(o.name)}</option>`).join('')}
      </select>
    `;
  }
  if (profile.status === 'rejected') {
    return `<button class="btn-sm btn-approve" onclick="approveUser('${id}')">Godkjenn likevel</button>`;
  }
  return '';
}

async function approveUser(userId) {
  const { error } = await db.from('profiles').update({
    status: 'active',
    approved_at: new Date().toISOString(),
    approved_by: currentUser.id
  }).eq('id', userId);
  if (error) { alert('Feil: ' + error.message); return; }
  await refreshData();
  renderSection();
}

async function rejectUser(userId) {
  if (!confirm('Er du sikker?')) return;
  const { error } = await db.from('profiles').update({ status: 'rejected' }).eq('id', userId);
  if (error) { alert('Feil: ' + error.message); return; }
  await refreshData();
  renderSection();
}

async function addUserToOrg(userId, orgId) {
  if (!orgId) return;
  const { error } = await db.from('organization_members').upsert({
    org_id: orgId, user_id: userId, role: 'member'
  });
  if (error) { alert('Feil: ' + error.message); return; }
  await refreshData();
  renderSection();
}

// ─── ORGANIZATIONS ───────────────────────────────────────────

function renderOrgs(el) {
  el.innerHTML = `
    <h1>Organisasjoner</h1>

    <!-- Create form -->
    <div style="margin-bottom:32px">
      <h2>Opprett ny organisasjon</h2>
      <div class="admin-form" style="flex-direction:row;gap:12px;align-items:flex-end;max-width:600px">
        <div style="flex:1"><label>Navn</label><input id="new-org-name" placeholder="Firmanavn AS"></div>
        <div style="flex:1"><label>Slug</label><input id="new-org-slug" placeholder="firmanavn-as"></div>
        <button class="btn-primary" onclick="createOrg()">Opprett</button>
      </div>
    </div>

    <!-- Org list -->
    ${allOrgs.length === 0 ? '<p style="color:var(--muted)">Ingen organisasjoner opprettet ennå.</p>' : ''}
    ${allOrgs.map(org => renderOrgCard(org)).join('')}
  `;

  // Auto-generate slug from name
  const nameInput = document.getElementById('new-org-name');
  const slugInput = document.getElementById('new-org-slug');
  if (nameInput && slugInput) {
    nameInput.addEventListener('input', () => {
      slugInput.value = nameInput.value.toLowerCase()
        .replace(/[æ]/g,'ae').replace(/[ø]/g,'oe').replace(/[å]/g,'aa')
        .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    });
  }
}

function renderOrgCard(org) {
  const members = allOrgMembers.filter(m => m.org_id === org.id);
  const isOpen = selectedOrgId === org.id;

  // Get product access for this org
  // We'll load this on demand
  return `
    <div class="org-detail" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleOrgDetail('${org.id}')">
        <h3>🏢 ${esc(org.name)} <span style="color:var(--dim);font-size:12px;font-weight:400">${esc(org.slug)}</span></h3>
        <span style="color:var(--muted)">${members.length} medlemmer ${isOpen ? '▲' : '▼'}</span>
      </div>
      ${isOpen ? renderOrgDetail(org, members) : ''}
    </div>
  `;
}

function toggleOrgDetail(orgId) {
  selectedOrgId = selectedOrgId === orgId ? null : orgId;
  renderSection();
}

function renderOrgDetail(org, members) {
  // Find profiles for members
  const memberProfiles = members.map(m => {
    const profile = allProfiles.find(p => p.id === m.user_id);
    return { ...m, profile };
  });

  return `
    <div style="margin-top:16px">
      <!-- Members -->
      <h4 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Medlemmer</h4>
      ${memberProfiles.length === 0 ? '<p style="color:var(--dim);font-size:13px">Ingen medlemmer ennå.</p>' : ''}
      <div class="member-list">
        ${memberProfiles.map(m => `
          <div class="member-row">
            <span class="member-name">${esc(m.profile?.full_name || m.profile?.email || m.user_id)}</span>
            <select class="btn-sm" style="font-size:11px;padding:3px 8px" onchange="updateMemberRole('${org.id}','${m.user_id}',this.value)">
              <option value="member" ${m.role==='member'?'selected':''}>Medlem</option>
              <option value="admin" ${m.role==='admin'?'selected':''}>Admin</option>
              <option value="owner" ${m.role==='owner'?'selected':''}>Eier</option>
            </select>
            <button class="member-remove" onclick="removeMember('${org.id}','${m.user_id}')">Fjern</button>
          </div>
        `).join('')}
      </div>

      <!-- Add member -->
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
        <select id="add-member-${org.id}" class="btn-sm" style="flex:1;max-width:250px">
          <option value="">Legg til bruker...</option>
          ${allProfiles.filter(p => p.status === 'active' && !members.some(m => m.user_id === p.id)).map(p =>
            `<option value="${p.id}">${esc(p.full_name || p.email)}</option>`
          ).join('')}
        </select>
        <button class="btn-sm" onclick="addMemberToOrg('${org.id}')">Legg til</button>
      </div>

      <!-- Product access -->
      <h4 style="font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px">Produktkategori-tilgang</h4>
      <div class="product-access" id="product-access-${org.id}">
        ${allCategories.map(cat => `
          <label>
            <input type="checkbox" data-org="${org.id}" data-slug="${cat.slug || cat.name}"
              onchange="toggleProductAccess('${org.id}', '${cat.slug || cat.name}', this.checked)">
            ${esc(cat.name)}
          </label>
        `).join('')}
      </div>

      <!-- Delete org -->
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <button class="btn-sm btn-reject" onclick="deleteOrg('${org.id}')">🗑 Slett organisasjon</button>
      </div>
    </div>
  `;
}

async function createOrg() {
  const name = document.getElementById('new-org-name').value.trim();
  const slug = document.getElementById('new-org-slug').value.trim();
  if (!name || !slug) { alert('Fyll inn navn og slug.'); return; }
  const { error } = await db.from('organizations').insert({ name, slug });
  if (error) { alert('Feil: ' + error.message); return; }
  await refreshData();
  renderSection();
}

async function deleteOrg(orgId) {
  if (!confirm('Er du sikker på at du vil slette denne organisasjonen?')) return;
  const { error } = await db.from('organizations').delete().eq('id', orgId);
  if (error) { alert('Feil: ' + error.message); return; }
  selectedOrgId = null;
  await refreshData();
  renderSection();
}

async function addMemberToOrg(orgId) {
  const select = document.getElementById(`add-member-${orgId}`);
  const userId = select?.value;
  if (!userId) return;
  const { error } = await db.from('organization_members').upsert({ org_id: orgId, user_id: userId, role: 'member' });
  if (error) { alert('Feil: ' + error.message); return; }
  await refreshData();
  renderSection();
}

async function removeMember(orgId, userId) {
  if (!confirm('Fjerne bruker fra organisasjonen?')) return;
  const { error } = await db.from('organization_members').delete().eq('org_id', orgId).eq('user_id', userId);
  if (error) { alert('Feil: ' + error.message); return; }
  await refreshData();
  renderSection();
}

async function updateMemberRole(orgId, userId, role) {
  const { error } = await db.from('organization_members').update({ role }).eq('org_id', orgId).eq('user_id', userId);
  if (error) { alert('Feil: ' + error.message); return; }
  await refreshData();
}

async function toggleProductAccess(orgId, categorySlug, checked) {
  if (checked) {
    const { error } = await db.from('organization_product_access').upsert({ org_id: orgId, category_slug: categorySlug });
    if (error) alert('Feil: ' + error.message);
  } else {
    const { error } = await db.from('organization_product_access').delete().eq('org_id', orgId).eq('category_slug', categorySlug);
    if (error) alert('Feil: ' + error.message);
  }
}

// Load product access checkboxes after render
async function loadProductAccess(orgId) {
  const { data } = await db.from('organization_product_access').select('category_slug').eq('org_id', orgId);
  if (!data) return;
  const slugs = data.map(d => d.category_slug);
  document.querySelectorAll(`#product-access-${orgId} input[type=checkbox]`).forEach(cb => {
    cb.checked = slugs.includes(cb.dataset.slug);
  });
}

// ─── HELPERS ─────────────────────────────────────────────────

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function formatDate(iso) {
  if (!iso) return '–';
  const d = new Date(iso);
  return d.toLocaleDateString('nb-NO', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function statusLabel(s) {
  const map = { pending: 'Venter', active: 'Aktiv', rejected: 'Avvist' };
  return map[s] || s;
}

// ─── BOOT ────────────────────────────────────────────────────
adminInit();

// After render, load product access for open org
const _origRenderSection = renderSection;
renderSection = function() {
  _origRenderSection();
  if (selectedOrgId) {
    setTimeout(() => loadProductAccess(selectedOrgId), 50);
  }
};
</script>
</body>
</html>
